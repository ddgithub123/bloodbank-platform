<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .navbar {
            background-color: #c62828;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }
        .sidebar {
            width: 200px;
            height: 100vh;
            background: #d32f2f;
            color: white;
            position: fixed;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-top: 10px;
        }
        .sidebar a:hover {
            background: #b71c1c;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .notification-list {
            list-style: none;
            padding: 0;
        }
        .notification-list li {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .mark-read {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 5px;
            float: right;
        }
        .mark-read:hover {
            background: #b71c1c;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/notifications/')
                .then(response => response.json())
                .then(data => {
                    let notificationList = document.getElementById("notificationList");
                    data.notifications.forEach(notification => {
                        let listItem = `<li>
                            <strong>${notification.title}</strong>
                            <p>${notification.message}</p>
                            <button class="mark-read" onclick="markAsRead(${notification.id})">Mark as Read</button>
                        </li>`;
                        notificationList.innerHTML += listItem;
                    });
                });
        });

        function markAsRead(notificationId) {
            fetch('/api/mark-notification/', {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ id: notificationId })
            }).then(response => response.json())
              .then(data => {
                  alert(data.message);
                  location.reload();
              });
        }
    </script>
</head>
<body>
    <div class="navbar">
        Welcome, {{ user.username }} | Notifications
    </div>
    <div class="sidebar">
        <a href="#">🏠 Profile</a>
        <a href="#">📅 My Donations</a>
        <a href="#">🔔 Notifications</a>
        <a href="#">📍 Nearby Camps</a>
        <a href="#">📅 Book Appointment</a>
        <a href="#">📞 Contact Support</a>
    </div>
    <div class="content">
        <h2>Notifications</h2>
        <ul class="notification-list" id="notificationList">
            <!-- Data will be loaded here -->
        </ul>
    </div>
</body>
</html>
