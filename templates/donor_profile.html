{% extends 'donor_dash.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
    <h2>My Profile</h2>
    <div class="card">
        <p><strong>Name:</strong> {{ user.username }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Blood Group:</strong> {{ user.profile.blood_group }}</p>
        <p><strong>Last Donation:</strong> {{ last_donation_date }}</p>
    </div>
{% endblock %}
