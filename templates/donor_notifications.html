{% extends 'donor_dash.html' %}
{% block title %}Notifications{% endblock %}
{% block content %}
    <h2>Recent Notifications</h2>
    {% for notification in notifications %}
        <div class="card">
            <p>{{ notification.message }}</p>
            <p><small>{{ notification.date }}</small></p>
        </div>
    {% endfor %}
{% endblock %}
